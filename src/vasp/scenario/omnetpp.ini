*.node[*].appl.detectorType = 1
*.node[19].appl.maliciousProbability = 1.0
*.node[19].appl.attackType = 11
*.node[19].appl.attackPolicy = 0

[Config B2_A2]
description = "B2 VCADS + A2 FakeEEBL StopAfterAttack"
*.node[*].appl.detectorType = 2
*.node[19].appl.maliciousProbability = 1.0
*.node[19].appl.attackType = 11
*.node[19].appl.attackPolicy = 0

[Config B3_A2]
description = "B3 F2MD + A2 FakeEEBL StopAfterAttack"
*.node[*].appl.detectorType = 3
*.node[19].appl.maliciousProbability = 1.0
*.node[19].appl.attackType = 11
*.node[19].appl.attackPolicy = 0

[Config P_A2]
