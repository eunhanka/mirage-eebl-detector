# -------------------------------------------------------------------
#  EEBL Misbehavior Detection  - Full Comparison
#  Detectors: B0(Naive), B1(Threshold), B2(VCADS), B3(F2MD), P(Proposed)
#  Attacks:   Baseline(none), A1(FakeEEBL_JustAttack), A2(FakeEEBL_StopAfter)
# -------------------------------------------------------------------

[General]
cmdenv-express-mode = true
cmdenv-autoflush = true
cmdenv-status-frequency = 1s
**.cmdenv-log-level = info

image-path = ../../images
network = DefconScenario

debug-on-errors = false
print-undisposed = true
sim-time-limit = 120s

**.scalar-recording = true
**.vector-recording = true

*.playgroundSizeX = 5000m
*.playgroundSizeY = 5000m
*.playgroundSizeZ = 50m

*.annotations.draw = true

*.manager.updateInterval = 0.1s
*.manager.host = "localhost"
*.manager.port = 9999
*.manager.autoShutdown = true
*.manager.launchConfig = xmldoc("highway.launchd.xml")

*.rsu[0].mobility.x = 1500
*.rsu[0].mobility.y = 50
*.rsu[0].mobility.z = 3
*.rsu[*].applType = "TraCIDemoRSU11p"
*.rsu[*].appl.headerLength = 80 bit
*.rsu[*].appl.sendBeacons = true
*.rsu[*].appl.dataOnSch = false
*.rsu[*].appl.beaconInterval = 1s
*.rsu[*].appl.beaconUserPriority = 7
*.rsu[*].appl.dataUserPriority = 5
*.rsu[*].nic.phy80211p.antennaOffsetZ = 0 m

*.connectionManager.sendDirect = true
*.connectionManager.maxInterfDist = 2600m
*.connectionManager.drawMaxIntfDist = false

*.**.nic.mac1609_4.useServiceChannel = false
*.**.nic.mac1609_4.txPower = 20mW
*.**.nic.mac1609_4.bitrate = 6Mbps
*.**.nic.phy80211p.minPowerLevel = -110dBm
*.**.nic.phy80211p.useNoiseFloor = true
*.**.nic.phy80211p.noiseFloor = -98dBm
*.**.nic.phy80211p.decider = xmldoc("highway.config.xml")
*.**.nic.phy80211p.analogueModels = xmldoc("highway.config.xml")
*.**.nic.phy80211p.usePropagationDelay = true
*.**.nic.phy80211p.antenna = xmldoc("../../../examples/veins/antenna.xml", "/root/Antenna[@id='monopole']")
*.node[*].nic.phy80211p.antennaOffsetY = 0 m
*.node[*].nic.phy80211p.antennaOffsetZ = 1.895 m

*.node[*].applType = "CarApp"
*.node[*].appl.headerLength = 80 bit
*.node[*].appl.sendBeacons = true
*.node[*].appl.dataOnSch = false
*.node[*].appl.beaconInterval = 0.1s
*.node[*].appl.mapFile = "highway.junctions.json"
*.node[*].appl.runID = "${runid}"

# Default: Proposed detector, no attack
*.node[*].appl.detectorType = 4
*.node[*].appl.attackPolicy = 0
*.node[*].appl.sporadicInsertionRate = 0.0
*.node[*].appl.maliciousProbability = 0.0
*.node[*].appl.attackType = 0
*.node[*].appl.nDosMessages = 4
*.node[*].appl.posAttackOffset = 10m
*.node[*].appl.dimensionAttackOffset = 4m
*.node[*].appl.headingAttackOffset = 0.5235987756rad
*.node[*].appl.yawRateAttackOffset = 4
*.node[*].appl.accelerationAttackOffset = 2
*.node[*].appl.speedAttackOffset = 10mps

*.node[*].veinsmobility.x = 0
*.node[*].veinsmobility.y = 0
*.node[*].veinsmobility.z = 0
*.node[*].veinsmobility.setHostSpeed = false

**.traceManager.filepath = "${resultdir}/rxtrace-${runid}.csv"

# -------------------------------------------------------------------
#  Baseline (No Attack) x All Detectors
# -------------------------------------------------------------------

[Config B0_Baseline]
description = "B0 Naive + No Attack"
*.node[*].appl.detectorType = 0

[Config B1_Baseline]
description = "B1 Threshold + No Attack"
*.node[*].appl.detectorType = 1

[Config B2_Baseline]
description = "B2 VCADS + No Attack"
*.node[*].appl.detectorType = 2

[Config B3_Baseline]
description = "B3 F2MD + No Attack"
*.node[*].appl.detectorType = 3

[Config P_Baseline]
description = "Proposed IDM + No Attack"
*.node[*].appl.detectorType = 4

# -------------------------------------------------------------------
#  Attack A1 (FakeEEBL_JustAttack) x All Detectors
# -------------------------------------------------------------------

[Config B0_A1]
description = "B0 Naive + A1 FakeEEBL JustAttack"
*.node[*].appl.detectorType = 0
*.node[19].appl.maliciousProbability = 1.0
*.node[19].appl.attackType = 10
*.node[19].appl.attackPolicy = 0

[Config B1_A1]
description = "B1 Threshold + A1 FakeEEBL JustAttack"
*.node[*].appl.detectorType = 1
*.node[19].appl.maliciousProbability = 1.0
*.node[19].appl.attackType = 10
*.node[19].appl.attackPolicy = 0

[Config B2_A1]
description = "B2 VCADS + A1 FakeEEBL JustAttack"
*.node[*].appl.detectorType = 2
*.node[19].appl.maliciousProbability = 1.0
*.node[19].appl.attackType = 10
*.node[19].appl.attackPolicy = 0

[Config B3_A1]
description = "B3 F2MD + A1 FakeEEBL JustAttack"
*.node[*].appl.detectorType = 3
*.node[19].appl.maliciousProbability = 1.0
*.node[19].appl.attackType = 10
*.node[19].appl.attackPolicy = 0

[Config P_A1]
description = "Proposed IDM + A1 FakeEEBL JustAttack"
*.node[*].appl.detectorType = 4
*.node[19].appl.maliciousProbability = 1.0
*.node[19].appl.attackType = 10
*.node[19].appl.attackPolicy = 0

